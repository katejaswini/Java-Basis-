<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bank Home</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #134e5e, #71b280);
}

.home-container {
    width: 600px;
    background: white;
    padding: 30px;
    margin: 80px auto;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
}

.home-container h1 {
    margin-bottom: 30px;
}

.menu form {
    margin: 10px 0;
}

.menu input[type="submit"] {
    width: 100%;
    padding: 12px;
    background: #134e5e;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 18px;
    cursor: pointer;
}

.menu input[type="submit"]:hover {
    background: #71b280;
}

.menu .logout input[type="submit"] {
    background: #c0392b;
}

.menu .logout input[type="submit"]:hover {
    background: #e74c3c;
}
</style>

</head>
<body>

<div class="home-container">
    <h1>Welcome to My Bank</h1>

    <div class="menu">

        <form action="createAccount.html" method="get">
            <input type="submit" value="Create Account">
        </form>

        <form action="deposit.html" method="get">
            <input type="submit" value="Deposit">
        </form>

        <form action="withdraw.html" method="get">
            <input type="submit" value="Withdraw">
        </form>

        <form action="checkBalance.html" method="get">
            <input type="submit" value="Check Balance">
        </form>

        <form action="transaction.html" method="get">
            <input type="submit" value="Transaction History">
        </form>

        <form action="logoutservlet" method="get" class="logout">
            <input type="submit" value="Logout">
        </form>

    </div>
</div>

</body>
</html>
